name: Collect NetLS Data

# Task 3: 백필형 수집기를 일 1회 실행하고, 데이터 변경 시에만 커밋·푸시한다.
# 데이터 커밋이 지속되는 한 60일 비활성화 규칙은 자동 회피된다.
#
# 주기: Task 0 판정 B(fapi 미국차단) → source=vision(일 덤프). vision은 전일 데이터라
# 하루 지연되므로 일 1회면 충분하다. 08:00 UTC(17:00 KST)에 전일 덤프 발행 후 실행.
# Actions cron은 지연이 흔하나 백필 구조(마지막 저장일부터 재수집)로 무해화된다.
on:
  schedule:
    - cron: "0 8 * * *"     # 매일 08:00 UTC (17:00 KST)
  workflow_dispatch:

# 이전 실행이 안 끝났으면 중복 실행 방지 (푸시 경합 방지).
concurrency:
  group: collect
  cancel-in-progress: false

permissions:
  contents: write   # 데이터 커밋·푸시

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run collector
        run: python collector.py --config config.json | tee collector_stdout.log

      - name: Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략."
            exit 0
          fi
          SUMMARY="$(cat data/_last_run_summary.txt 2>/dev/null || echo 'collect: data update')"
          git commit -m "data: ${SUMMARY}"
          # 스케줄 겹침으로 원격이 앞서갔을 수 있으니 rebase 후 재푸시 1회 시도.
          for i in 1 2 3; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push && break
            echo "push 재시도 $i..."
            sleep 5
          done

      - name: Upload run log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: collector-log
          path: |
            collector_stdout.log
            data/_runlog.csv
          if-no-files-found: ignore
